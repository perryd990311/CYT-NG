{% extends "base.html" %}
{% block title %}Devices — CYT-NG{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h4 class="mb-0"><i class="bi bi-phone"></i> Devices ({{ total }})</h4>
  <form class="d-flex gap-2" method="get">
    <input type="text" name="q" value="{{ search }}" class="form-control form-control-sm"
           placeholder="Search MAC or manufacturer…"
           hx-get="{{ url_for('devices.index') }}"
           hx-trigger="keyup changed delay:400ms"
           hx-target="#device-table"
           hx-include="[name='q']"
           hx-push-url="true">
  </form>
</div>

<div class="card">
  <div class="card-body p-0" id="device-table">
    {% include "partials/device_list.html" %}
  </div>
</div>

<!-- ── Device Quick-View Popup ──────────────────────────────── -->
<div id="device-popup-backdrop" class="device-popup-backdrop" style="display:none"></div>
<div id="device-popup" class="device-popup" style="display:none">
  <div class="device-popup-header">
    <div class="d-flex align-items-center gap-2 flex-grow-1 min-w-0">
      <span id="dp-dot" class="color-dot"></span>
      <div class="min-w-0">
        <span id="dp-mac" class="mac-addr text-info"></span>
        <span id="dp-rand" class="badge bg-warning text-dark ms-1" style="font-size:0.55rem;padding:0.12em 0.35em;display:none">R</span>
        <div id="dp-fname" class="friendly-name"></div>
      </div>
    </div>
    <div class="d-flex align-items-center gap-1">
      <button id="dp-prev" class="btn btn-sm btn-outline-secondary device-popup-nav" title="Previous device"><i class="bi bi-chevron-up"></i></button>
      <button id="dp-next" class="btn btn-sm btn-outline-secondary device-popup-nav" title="Next device"><i class="bi bi-chevron-down"></i></button>
      <button id="dp-close" class="btn btn-sm btn-outline-secondary device-popup-nav ms-1" title="Close"><i class="bi bi-x-lg"></i></button>
    </div>
  </div>
  <div class="device-popup-body">
    <div class="row g-2 mb-2">
      <div class="col-6">
        <div class="dp-label">Manufacturer</div>
        <div id="dp-mfr" class="dp-value">—</div>
      </div>
      <div class="col-6">
        <div class="dp-label">Type</div>
        <div id="dp-type" class="dp-value">—</div>
      </div>
    </div>
    <div class="row g-2 mb-2">
      <div class="col-6">
        <div class="dp-label">First Seen</div>
        <div id="dp-first" class="dp-value">—</div>
      </div>
      <div class="col-6">
        <div class="dp-label">Last Seen</div>
        <div id="dp-last" class="dp-value">—</div>
      </div>
    </div>
    <div class="mb-2">
      <div class="dp-label">Probed SSIDs</div>
      <div id="dp-ssids" class="dp-value">—</div>
    </div>
  </div>
  <div class="device-popup-footer">
    <a id="dp-detail-link" href="#" class="btn btn-sm btn-outline-info w-100">
      <i class="bi bi-box-arrow-up-right me-1"></i>Full Detail
    </a>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function() {
  const popup     = document.getElementById('device-popup');
  const backdrop  = document.getElementById('device-popup-backdrop');
  const elMac     = document.getElementById('dp-mac');
  const elDot     = document.getElementById('dp-dot');
  const elFname   = document.getElementById('dp-fname');
  const elRand    = document.getElementById('dp-rand');
  const elMfr     = document.getElementById('dp-mfr');
  const elType    = document.getElementById('dp-type');
  const elFirst   = document.getElementById('dp-first');
  const elLast    = document.getElementById('dp-last');
  const elSsids   = document.getElementById('dp-ssids');
  const elLink    = document.getElementById('dp-detail-link');
  const btnPrev   = document.getElementById('dp-prev');
  const btnNext   = document.getElementById('dp-next');
  const btnClose  = document.getElementById('dp-close');

  let currentIdx = -1;

  function getRows() {
    return Array.from(document.querySelectorAll('#device-table .device-row'));
  }

  function ssidTag(ssid) {
    // Simple deterministic hue from string
    let h = 0;
    for (let i = 0; i < ssid.length; i++) h = ((h << 5) - h + ssid.charCodeAt(i)) | 0;
    h = Math.abs(h) % 360;
    return '<span class="ssid-tag" style="background:hsla(' + h + ',60%,40%,0.2);border-color:hsla(' + h + ',60%,50%,0.35);color:hsl(' + h + ',70%,70%)">' +
      ssid.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</span>';
  }

  function show(row, idx) {
    currentIdx = idx;
    const d = row.dataset;

    elDot.style.background = d.color;
    elMac.textContent = d.mac;
    elFname.textContent = d.fname;
    elRand.style.display = d.rand === 'true' ? '' : 'none';
    elMfr.textContent = d.mfr || '—';
    elType.textContent = d.type || '—';
    elFirst.textContent = d.first || '—';
    elLast.textContent = d.last || '—';
    elLink.href = d.detail;

    // SSIDs
    const ssids = d.ssids ? d.ssids.split('|||').filter(Boolean) : [];
    if (ssids.length) {
      elSsids.innerHTML = ssids.map(ssidTag).join('');
    } else {
      elSsids.innerHTML = '<span class="text-muted" style="font-size:0.8rem">No probed SSIDs</span>';
    }

    // Nav button state
    const rows = getRows();
    btnPrev.disabled = idx <= 0;
    btnNext.disabled = idx >= rows.length - 1;

    // Highlight active row
    rows.forEach(r => r.classList.remove('device-row-active'));
    row.classList.add('device-row-active');

    // Position popup near the row
    const rect = row.getBoundingClientRect();
    const scrollY = window.scrollY || window.pageYOffset;
    popup.style.top = (rect.top + scrollY + rect.height / 2) + 'px';

    popup.style.display = '';
    backdrop.style.display = '';
    row.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  function hide() {
    popup.style.display = 'none';
    backdrop.style.display = 'none';
    currentIdx = -1;
    getRows().forEach(r => r.classList.remove('device-row-active'));
  }

  function navigate(delta) {
    const rows = getRows();
    const next = currentIdx + delta;
    if (next >= 0 && next < rows.length) {
      show(rows[next], next);
    }
  }

  // Delegate click on table rows
  document.getElementById('device-table').addEventListener('click', function(e) {
    const row = e.target.closest('.device-row');
    if (!row) return;
    // Don't hijack link clicks
    if (e.target.closest('a')) return;
    e.preventDefault();
    const rows = getRows();
    const idx = rows.indexOf(row);
    show(row, idx);
  });

  backdrop.addEventListener('click', hide);
  btnClose.addEventListener('click', hide);
  btnPrev.addEventListener('click', function() { navigate(-1); });
  btnNext.addEventListener('click', function() { navigate(1); });

  // Keyboard nav
  document.addEventListener('keydown', function(e) {
    if (popup.style.display === 'none') return;
    if (e.key === 'Escape') { hide(); e.preventDefault(); }
    else if (e.key === 'ArrowUp') { navigate(-1); e.preventDefault(); }
    else if (e.key === 'ArrowDown') { navigate(1); e.preventDefault(); }
    else if (e.key === 'Enter') { window.location.href = elLink.href; }
  });
})();
</script>
{% endblock %}
