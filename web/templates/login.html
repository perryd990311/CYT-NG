{% extends "base.html" %}

{% block title %}Sign In — CYT-NG{% endblock %}

{% block content %}
<div class="row justify-content-center" style="margin-top:12vh;">
    <div class="col-sm-8 col-md-5 col-lg-4">
        <div class="auth-card">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-wifi auth-icon"></i>
                    <h3 class="mt-2">CYT-NG</h3>
                    <p class="small" style="color:var(--cyt-text-muted);">Wi-Fi Surveillance Detection</p>
                </div>

                <form method="post" action="{{ url_for('auth.login') }}">
                    <div class="mb-3">
                        <label class="form-label" for="username">Username</label>
                        <input type="text" id="username" name="username"
                               class="form-control"
                               required autofocus autocomplete="username">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="password">Password</label>
                        <input type="password" id="password" name="password"
                               class="form-control"
                               required autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn btn-success w-100">
                        <i class="bi bi-box-arrow-in-right"></i> Sign In
                    </button>
                </form>

                {% if sso_enabled %}
                <hr class="my-4" style="border-color:var(--cyt-border);">
                <a href="{{ url_for('auth.sso_login') }}" class="btn btn-outline-light w-100">
                    <i class="bi bi-shield-lock"></i> Sign in with Synology DSM
                </a>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
