{% extends "base.html" %}

{% block title %}Sensors — CYT-NG{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h5 class="mb-0 fw-semibold" style="color:var(--cyt-text)">
        <i class="bi bi-router" style="color:var(--cyt-cyan)"></i>
        Sensors <span class="text-muted">({{ sensor_stats|length }})</span>
    </h5>
    <a href="{{ url_for('sensors.add') }}" class="btn btn-outline-success btn-sm">
        <i class="bi bi-plus-lg"></i> Add Sensor
    </a>
</div>

<div id="sensor-list"
     hx-get="{{ url_for('sensors.index') }}"
     hx-trigger="every 30s"
     hx-swap="innerHTML">
    {% include "partials/sensor_list.html" %}
</div>
{% endblock %}
