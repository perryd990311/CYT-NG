<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In — CYT-NG (Mockup)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>

  <!-- Minimal top bar (no tabs for unauthenticated) -->
  <nav class="cyt-topbar px-3 py-2 d-flex align-items-center">
    <a class="text-decoration-none d-flex align-items-center gap-2" href="#">
      <i class="bi bi-wifi" style="color: var(--cyt-cyan); font-size: 1.25rem;"></i>
      <span class="fw-bold fs-5" style="color: var(--cyt-text);">CYT-NG</span>
    </a>
  </nav>

  <main class="container-fluid">
    <div class="row justify-content-center" style="margin-top:12vh;">
      <div class="col-sm-8 col-md-5 col-lg-4">
        <div class="auth-card">
          <div class="card-body p-4">
            <div class="text-center mb-4">
              <i class="bi bi-wifi auth-icon"></i>
              <h3 class="mt-2">CYT-NG</h3>
              <p class="small" style="color:var(--cyt-text-muted);">Wi-Fi Surveillance Detection</p>
            </div>

            <form>
              <div class="mb-3">
                <label class="form-label" for="username">Username</label>
                <input type="text" id="username" class="form-control" autofocus autocomplete="username">
              </div>
              <div class="mb-3">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" class="form-control" autocomplete="current-password">
              </div>
              <button type="button" class="btn btn-success w-100" onclick="window.location='dashboard.html'">
                <i class="bi bi-box-arrow-in-right"></i> Sign In
              </button>
            </form>

            <hr class="my-4" style="border-color:var(--cyt-border);">
            <a href="#" class="btn btn-outline-light w-100">
              <i class="bi bi-shield-lock"></i> Sign in with Synology DSM
            </a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
