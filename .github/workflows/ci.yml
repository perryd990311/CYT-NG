name: CI

on:
  # Disabled for now — re-enable by removing this condition
  workflow_dispatch:
  push:
    branches: [] # Empty to prevent automatic triggers
  pull_request:
    branches: [] # Empty to prevent automatic triggers

permissions:
  contents: read
  security-events: write

jobs:
  # ── Python checks ──────────────────────────────────────────────────────────
  python:
    name: Python – syntax, format & import checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt black flake8

      - name: Syntax check (all .py files)
        run: python -m compileall cyt/ web/

      - name: Format check (black)
        run: black --check cyt/ web/ --line-length 100

      - name: Lint check (flake8)
        run: flake8 cyt/ web/ --max-line-length 100 --ignore E501,W503,E203

      - name: Import check (cyt package)
        env:
          FLASK_ENV: testing
          KISMET_LOGS: /tmp/kismet
          IGNORE_LISTS: ignore_lists
        run: python -c "import cyt; print('CYT package imported successfully')"

  # ── Docker build (base image first, then dependents) ────────────────────────
  docker-base:
    name: Docker – build & scan cyt-base
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build cyt-base image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.base
          build-args: REPO_PREFIX=
          push: false
          tags: cyt-base:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Run Trivy scan on cyt-base
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: cyt-base:ci
          format: sarif
          output: trivy-cyt-base.sarif
          severity: HIGH,CRITICAL

      - name: Upload Trivy scan results for cyt-base
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-cyt-base.sarif
          category: trivy-cyt-base

  # cyt-web depends on cyt-base — use plain docker build so FROM cyt-base:latest resolves locally
  docker-web:
    name: Docker – build & scan cyt-web
    needs: docker-base
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build cyt-base
        run: docker build -f docker/Dockerfile.base --build-arg REPO_PREFIX= -t cyt-base:latest .

      - name: Build cyt-web
        run: docker build -f docker/Dockerfile --build-arg REPO_PREFIX= -t cyt-web:ci .

      - name: Run Trivy scan on cyt-web
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: cyt-web:ci
          format: sarif
          output: trivy-cyt-web.sarif
          severity: HIGH,CRITICAL

      - name: Upload Trivy scan results for cyt-web
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-cyt-web.sarif
          category: trivy-cyt-web

  # cyt-nginx is independent — can use buildx with GHA cache
  docker-nginx:
    name: Docker – build & scan cyt-nginx
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build cyt-nginx image
        uses: docker/build-push-action@v7
        with:
          context: nginx/
          file: nginx/Dockerfile
          push: false
          tags: cyt-nginx:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Run Trivy scan on cyt-nginx
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: cyt-nginx:ci
          format: sarif
          output: trivy-cyt-nginx.sarif
          severity: HIGH,CRITICAL

      - name: Upload Trivy scan results for cyt-nginx
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-cyt-nginx.sarif
          category: trivy-cyt-nginx
