name: CI

on:
  # Disabled for now — re-enable by removing this condition
  workflow_dispatch:
  push:
    branches: [] # Empty to prevent automatic triggers
  pull_request:
    branches: [] # Empty to prevent automatic triggers

permissions:
  contents: read
  security-events: write

jobs:
  # ── Python checks ──────────────────────────────────────────────────────────
  python:
    name: Python – syntax, format & import checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt black flake8

      - name: Syntax check (all .py files)
        run: python -m compileall cyt/ web/

      - name: Format check (black)
        run: black --check cyt/ web/ --line-length 100

      - name: Lint check (flake8)
        run: flake8 cyt/ web/ --max-line-length 100 --ignore E501,W503,E203

      - name: Import check (cyt package)
        env:
          FLASK_ENV: testing
          KISMET_LOGS: /tmp/kismet
          IGNORE_LISTS: ignore_lists
        run: python -c "import cyt; print('CYT package imported successfully')"

  # ── Docker build (base image first, then dependents) ────────────────────────
  docker-base:
    name: Docker – build & scan cyt-base
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build cyt-base image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.base
          build-args: REPO_PREFIX=
          push: false
          tags: cyt-base:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Run Trivy scan on cyt-base
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: cyt-base:ci
          format: sarif
          output: trivy-cyt-base.sarif
          severity: HIGH,CRITICAL

      - name: Upload Trivy scan results for cyt-base
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-cyt-base.sarif
          category: trivy-cyt-base

  docker:
    name: Docker – build & scan ${{ matrix.image.name }}
    needs: docker-base
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - name: cyt-web
            dockerfile: docker/Dockerfile
            context: .
          - name: cyt-nginx
            dockerfile: nginx/Dockerfile
            context: nginx/
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Rebuild cyt-base from cache
        if: matrix.image.name == 'cyt-web'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.base
          build-args: REPO_PREFIX=
          push: false
          tags: cyt-base:latest
          cache-from: type=gha
          load: true

      - name: Build ${{ matrix.image.name }} image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          build-args: REPO_PREFIX=
          push: false
          tags: ${{ matrix.image.name }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Run Trivy scan on ${{ matrix.image.name }}
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.image.name }}:ci
          format: sarif
          output: trivy-${{ matrix.image.name }}.sarif
          severity: HIGH,CRITICAL

      - name: Upload Trivy scan results for ${{ matrix.image.name }}
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-${{ matrix.image.name }}.sarif
          category: trivy-${{ matrix.image.name }}
