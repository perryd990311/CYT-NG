name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Extract release notes for this version
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          echo "::notice title=Release Info::Tag: $TAG, Version: $VERSION"

          # Try RELEASE_NOTES.md first (preferred)
          NOTES=""
          if [ -f RELEASE_NOTES.md ]; then
            # Extract section for this version from RELEASE_NOTES.md
            NOTES=$(awk "/^## v${VERSION}[[:space:]]/{found=1; next} found && /^## v/{exit} found{print}" RELEASE_NOTES.md | sed '/^$/d')
          fi

          # Fallback to CHANGELOG.md if RELEASE_NOTES.md not found or empty
          if [ -z "$NOTES" ] && [ -f CHANGELOG.md ]; then
            NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md | sed '/^$/d')
          fi

          # Fallback to git log between tags
          if [ -z "$NOTES" ]; then
            PREV_TAG=$(git tag --sort=-version:refname --merged ${TAG}^@ | head -n 1 || echo "")
            if [ -n "$PREV_TAG" ]; then
              NOTES=$(git log ${PREV_TAG}..${TAG} --oneline --no-decorate)
            else
              NOTES=$(git log ${TAG} --oneline --no-decorate)
            fi
            NOTES="### Release commits

            ${NOTES}

            See full details at [Commits](https://github.com/${{ github.repository }}/compare/$PREV_TAG...$TAG)"
          fi

          # Final fallback
          if [ -z "$NOTES" ]; then
            NOTES="See [repository](https://github.com/${{ github.repository }}) for release details."
          fi

          # Write to file to safely pass multi-line content
          echo "$NOTES" > /tmp/release_notes.md
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Output summary
          echo "::group::Release notes (first 500 chars)"
          head -c 500 /tmp/release_notes.md
          echo "::endgroup::"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          name: "${{ github.ref_name }}"
          body_path: /tmp/release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
