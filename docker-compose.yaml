# CYT-NG Docker Compose
# Adapt volume paths and networking to your host before launching.

services:
  cyt-web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: cyt-web
    restart: unless-stopped
    # Set user to match your host UID:GID for volume permissions
    # user: "1000:1000"
    env_file: .env
    environment:
      - KISMET_DATA_PATH=/data/kismet
      - CYT_DATABASE_PATH=/data/cyt/cyt_data.db
    volumes:
      # Kismet data — directory where sensors sync .kismet files
      - ./kismet_data:/data/kismet:rw
      # Persistent CYT database & reports
      - ./data/cyt:/data/cyt
      - ./data/logs:/data/logs
      - ./data/reports:/data/reports
      - ./data/kml:/data/kml
      # Ignore lists (editable from host)
      - ./ignore_lists:/app/ignore_lists
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/status')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    read_only: true
    tmpfs:
      - /tmp
      - /run
    security_opt:
      - no-new-privileges:true 

  cyt-nginx:
    build:
      context: nginx/
      dockerfile: Dockerfile
    container_name: cyt-nginx
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      # Mount real certs here, or let entrypoint.sh auto-generate self-signed
      - ./certs:/etc/nginx/certs
    depends_on:
      cyt-web:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /run
    security_opt:
      - no-new-privileges:true
