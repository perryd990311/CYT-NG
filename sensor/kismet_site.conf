# CYT-NG Kismet site overrides
# Deployed by sensor/install.sh → /etc/kismet/kismet_site.conf
#
# These settings override the defaults in kismet.conf.
# See: https://www.kismetwireless.net/docs/readme/configuring/logging/

# ── Log rotation ──────────────────────────────────────────────────────────
# Rotate log files every 6 hours (21600 seconds).
# This keeps individual .kismet files small (~30-60 MB instead of 700+ MB).
# The CYT ingestion pipeline handles multiple small files just fine.
log_max_duration=21600

# ── Logging types ─────────────────────────────────────────────────────────
# Only keep the kismet SQLite log (we don't need pcap or other formats).
log_types=kismet

# Disable alert logging to reduce file bloat
kis_log_alert_rate=0

# ── Performance ───────────────────────────────────────────────────────────
# Flush to disk every 30s (default 60). Ensures more recent data is available
# when the sync script copies the file to the NAS.
kis_log_device_rate=30
